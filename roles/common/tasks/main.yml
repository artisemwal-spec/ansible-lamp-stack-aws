---
# tasks file for roles/common

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name: "{{ item }}"
    state: present
  loop: "{{ common_packages }}"

- name: Set timezone
  timezone:
    name: "{{ timezone }}"
  when: ansible_distribution == "Ubuntu"
